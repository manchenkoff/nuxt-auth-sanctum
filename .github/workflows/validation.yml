name: Nuxt [Validate]
env:
  node_version: 24
concurrency:
  group: nuxt-auth-sanctum-ci
  cancel-in-progress: false
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node_version }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Build stubs
        run: pnpm dev:prepare
      - name: Lint
        run: pnpm lint
      - name: Type check
        run: pnpm test:types
  test-unit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node_version }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Build stubs
        run: pnpm dev:prepare
      - name: Test [unit, nuxt]
        run: pnpm test --project=unit --project=nuxt
  test-e2e:
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node_version }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Build stubs
        run: pnpm dev:prepare
      - name: Install Playwright
        run: pnpm exec playwright install chromium --with-deps
      - name: Test [e2e]
        run: pnpm test --project=e2e
